<style>
        body { font-family: 'Source Sans 3', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full h-[56px] sticky top-0 bg-white border-b border-[#EEEEEE] flex justify-between items-center px-4 z-50">
<div class="flex-1 flex items-center">
<span class="material-symbols-outlined text-[#555555] cursor-pointer" id="back-arrow">arrow_back</span>
</div>
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-baseline gap-1 cursor-pointer select-none" data-ml-logo>
<span class="font-bold text-[18px] text-[#95C11E] leading-none">MeetLingo</span>
<span class="text-[11px] text-[#A77F4E] leading-none">by ZIMM</span>
</div>
<div class="flex-1 flex justify-end">
<div class="bg-[#EEEEEE] px-3 py-1 rounded-full">
<span class="text-[14px] font-medium text-[#555555]">--:--</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-0 py-xl">
<div class="max-w-[440px] w-full bg-surface-container-lowest border border-surface-container p-lg md:p-xl rounded-xl flex flex-col items-center text-center">
<!-- Branding Icon -->
<div class="mb-md">
<div class="w-16 h-16 rounded-full border-2 border-[#95C11E] flex items-center justify-center bg-white">
<span class="material-symbols-outlined text-[#95C11E] !text-[32px]">mail</span>
</div>
</div>
<!-- Header Section -->
<div class="space-y-base mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-background" id="ml-login-heading">Enter your email</h1>
<p class="font-body-md text-body-md text-tertiary" id="ml-login-sub">We'll send you a 6-digit code</p>
</div>
<!-- Input Section -->
<form class="w-full space-y-md" id="login-form">
<div class="relative w-full">
<input class="w-full px-md py-4 bg-white border-2 border-surface-container rounded-xl text-on-surface focus:border-primary focus:ring-0 transition-all font-body-md placeholder:text-outline-variant" placeholder="name@example.com" type="email" id="ml-email-input"/>
</div>
<button class="w-full bg-[#95C11E] text-white py-4 px-md rounded-xl font-label-md text-label-md uppercase tracking-widest flex items-center justify-center gap-base hover:opacity-90 active:scale-[0.98] transition-all" type="submit" id="ml-login-btn">SEND CODE <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Helper Text -->
<div class="mt-md">
<p class="font-caption text-caption text-tertiary" id="ml-login-helper">Check your inbox after tapping</p>
</div>
</div>
</main>
<script src="/js/ui-lang.js"></script>
<script>
    // Back arrow → index.html
    document.getElementById('back-arrow').addEventListener('click', () => {
        window.mlLeaveOk = true;
        window.location.href = 'index.html';
    });
    // Send Code button → verify.html (Email in localStorage speichern)
    document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const emailInput = document.querySelector('input[type="email"]');
        if (emailInput && emailInput.value.trim()) {
            localStorage.setItem('meetlingo_email', emailInput.value.trim());
        }
        window.mlLeaveOk = true;
        window.location.href = 'verify.html';
    });
    // Logo → home, beforeunload, translations
    mlWireLogoToHome();
    mlWireBeforeUnload();
    mlApply('login');
</script>

<!-- Visual Accent Element (Decorative) -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-[#95C11E] opacity-20"></div>
</body></html>

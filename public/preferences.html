<button class="lang-card min-h-touch-target-min p-4 rounded-lg bg-surface-container-lowest text-on-surface flex items-center justify-between text-left border border-outline-variant soft-lift hover:bg-surface-container transition-colors min-h-[80px]" data-lang="Arabic">

<!-- Floating CTA -->
<div class="fixed bottom-0 left-0 w-full p-container-padding bg-gradient-to-t from-surface via-surface to-transparent pt-8">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-cta text-cta rounded-lg soft-lift hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="start-btn" style="background-color: #95C11E;"><span id="ml-pref-start">START LISTENING</span><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<script>
    // Back arrow → verify.html
    document.getElementById('back-arrow').addEventListener('click', () => {
        window.mlLeaveOk = true;
        window.location.href = 'verify.html';
    });

    // Language card selection
    const langLabels = {
        Spanish:'Spanish · Español', French:'French · Français', German:'German · Deutsch',
        Italian:'Italian · Italiano', Japanese:'Japanese · 日本語', English:'English · English',
        Portuguese:'Portuguese · Português', Turkish:'Turkish · Türkçe', Dutch:'Dutch · Nederlands',
        Korean:'Korean · 한국어', Chinese:'Chinese · 中文', Arabic:'Arabic · العربية',
        Russian:'Russian · Русский', Polish:'Polish · Polski', Swedish:'Swedish · Svenska',
        Hindi:'Hindi · हिन्दी', Greek:'Greek · Ελληνικά', Ukrainian:'Ukrainian · Українська'
    };
    document.querySelectorAll('.lang-card').forEach(card => {
        card.addEventListener('click', () => {
            const lang = card.dataset.lang;
            localStorage.setItem('meetlingo_lang', lang);
            // Reset all cards
            document.querySelectorAll('.lang-card').forEach(c => {
                c.style.backgroundColor = '';
                c.style.color = '';
                c.style.borderColor = '';
                c.querySelector('.material-symbols-outlined')?.remove();
                c.classList.remove('border-2');
                c.classList.add('border');
            });
            // Highlight selected
            card.style.backgroundColor = '#95C11E';
            card.style.color = '#ffffff';
            card.style.borderColor = '#95C11E';
            card.classList.remove('border');
            card.classList.add('border-2');
            if (!card.querySelector('.material-symbols-outlined')) {
                const check = document.createElement('span');
                check.className = 'material-symbols-outlined text-3xl';
                check.style.fontVariationSettings = "'FILL' 1";
                check.textContent = 'check_circle';
                card.appendChild(check);
            }
            // Also update all UI labels to the newly selected language
            if (typeof mlApply === 'function') mlApply('preferences');
        });
    });

    // START LISTENING → waiting room checks the room's status on the server
    // and forwards into the meeting immediately if it's already live.
    document.getElementById('start-btn').addEventListener('click', () => {
        window.mlLeaveOk = true;
        window.location.href = 'waiting.html';
    });

    // ── Timer: Meeting noch nicht gestartet → --:-- ──
    (function() {
        var el = document.getElementById('pref-timer');
        if (el) el.textContent = '--:--';
    })();

    // ── More languages toggle ─────────────────────
    window.moreLangsOpen = false;
    var extendedLangs = ['Portuguese','Turkish','Dutch','Korean','Chinese','Arabic','Russian','Polish','Swedish','Hindi','Greek','Ukrainian'];
    document.getElementById('more-langs-btn').addEventListener('click', function() {
        window.moreLangsOpen = !window.moreLangsOpen;
        var t = (typeof mlT === 'function') ? mlT() : null;
        document.getElementById('more-langs-grid').style.display = window.moreLangsOpen ? 'grid' : 'none';
        document.getElementById('more-langs-icon').textContent  = window.moreLangsOpen ? 'remove_circle' : 'add_circle';
        document.getElementById('more-langs-label').textContent = window.moreLangsOpen
            ? (t && t.pref_less ? t.pref_less : 'Show less')
            : (t && t.pref_more ? t.pref_more : 'More languages');
    });

    // ── Apply saved (or default) language selection on load ──────────
    (function() {
        var savedLang = localStorage.getItem('meetlingo_lang') || 'English';
        // If saved lang is in extended list, open the drawer first
        if (extendedLangs.indexOf(savedLang) !== -1) {
            window.moreLangsOpen = true;
            document.getElementById('more-langs-grid').style.display = 'grid';
            document.getElementById('more-langs-icon').textContent  = 'remove_circle';
            document.getElementById('more-langs-label').textContent = 'Show less';
        }
        var card = document.querySelector('[data-lang="' + savedLang + '"]');
        if (card) card.click();
    })();
</script>
<script src="/js/ui-lang.js"></script>
<script>
    mlWireLogoToHome();
    mlWireBeforeUnload();
    mlApply('preferences');
</script>

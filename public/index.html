<script>
    // More languages toggle
    var moreLangsOpen = false;
    document.getElementById('more-langs-btn').addEventListener('click', function() {
        moreLangsOpen = !moreLangsOpen;
        document.getElementById('more-langs-grid').style.display = moreLangsOpen ? 'grid' : 'none';
        document.getElementById('more-langs-icon').textContent  = moreLangsOpen ? 'remove_circle' : 'add_circle';
        document.getElementById('more-langs-label').textContent = moreLangsOpen ? 'Show less' : 'More languages';
    });

    // Single fixed session — everyone joins the one MAIN room (no code).
    localStorage.setItem('meetlingo_room', 'MAIN');

    // Flag buttons → save language, then go to login
    document.querySelectorAll('.flag-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            localStorage.setItem('meetlingo_room', 'MAIN');
            localStorage.setItem('meetlingo_lang', btn.dataset.lang);
            window.location.href = 'login.html';
        });
    });
</script>

<script>
  // Generate real QR code for current URL
  (function() {
    var container = document.getElementById('index-qr-container');
    if (!container || typeof QRCode === 'undefined') return;
    container.innerHTML = ''; // clear placeholder
    new QRCode(container, {
      text:         window.location.origin,
      width:        180,
      height:       180,
      colorDark:    '#1A1A1A',
      colorLight:   '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.M
    });
  })();
</script>

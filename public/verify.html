<html lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Source Sans 3', sans-serif;
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full h-[56px] sticky top-0 bg-white border-b border-[#EEEEEE] z-50"><div class="relative flex items-center justify-between w-full h-full px-margin-mobile md:px-md max-w-container-max mx-auto">
<!-- Left: Back Arrow -->
<div class="flex items-center min-w-[48px]">
<button class="flex items-center justify-center hover:opacity-70 transition-opacity" id="back-arrow">
<span class="material-symbols-outlined" style="color: #555555;">arrow_back</span>
</button>
</div>
<!-- Center: Brand Logo -->
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-baseline gap-[4px] cursor-pointer select-none" data-ml-logo>
<span style="color: #95C11E; font-size: 18px; font-weight: 700; line-height: 1;">MeetLingo</span>
<span style="color: #A77F4E; font-size: 11px; font-weight: 400; line-height: 1;">by ZIMM</span>
</div>
<!-- Right: Timer Pill -->
<div class="flex items-center justify-end min-w-[48px]">
<div class="bg-[#EEEEEE] rounded-full px-3 py-1 flex items-center">
<span class="font-label-md text-[#555555]" style="font-size: 14px;">--:--</span>
</div>
</div>
</div></header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-lg py-xl">
<div class="w-full max-w-md bg-white border border-surface-container-highest p-md md:p-lg rounded shadow-sm flex flex-col items-center text-center">
<!-- Icon Container -->
<div class="mb-md flex items-center justify-center w-16 h-16 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-[40px]" style="color: #95C11E;">mail</span>
</div>
<!-- Heading -->
<h1 class="font-headline-lg text-headline-lg text-on-background mb-base" id="ml-verify-heading">Check your email</h1>
<!-- Subtext -->
<p class="font-body-md text-body-md text-on-surface-variant mb-xl max-w-xs" id="ml-verify-sub">
                We sent a 6-digit code to <span class="font-bold text-on-surface">name@example.com</span>
</p>
<!-- Verification Code Inputs -->
<div class="flex gap-xs md:gap-sm mb-xl w-full justify-center">
<input autofocus="" class="w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold border border-surface-variant rounded focus:outline-none focus:ring-1 bg-white text-on-surface focus:border-[#95C11E]" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold border border-surface-variant rounded focus:outline-none focus:ring-1 bg-white text-on-surface focus:border-[#95C11E]" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold border border-surface-variant rounded focus:outline-none focus:ring-1 bg-white text-on-surface focus:border-[#95C11E]" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold border border-surface-variant rounded focus:outline-none focus:ring-1 bg-white text-on-surface focus:border-[#95C11E]" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold border border-surface-variant rounded focus:outline-none focus:ring-1 bg-white text-on-surface focus:border-[#95C11E]" maxlength="1" type="text"/>
<input class="w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold border border-surface-variant rounded focus:outline-none focus:ring-1 bg-white text-on-surface focus:border-[#95C11E]" maxlength="1" type="text"/>
</div>
<!-- Primary CTA -->
<button class="w-full hover:opacity-90 active:scale-95 duration-100 text-on-primary font-headline-md text-headline-md py-4 rounded shadow-sm flex items-center justify-center gap-base mb-md transition-all" id="verify-btn" style="background-color: #95C11E;">VERIFY CODE <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Secondary Link -->
<button class="text-secondary font-label-md text-label-md underline hover:opacity-80 transition-opacity" id="ml-verify-resend">Resend code</button>
</div>
<script src="/js/ui-lang.js"></script>
<script>
    // Back arrow → login.html
    document.getElementById('back-arrow').addEventListener('click', () => {
        window.mlLeaveOk = true;
        window.location.href = 'login.html';
    });
    // Verify Code button → preferences.html
    document.getElementById('verify-btn').addEventListener('click', () => {
        window.mlLeaveOk = true;
        window.location.href = 'preferences.html';
    });
    // Auto-advance OTP boxes
    document.querySelectorAll('input[maxlength="1"]').forEach((input, i, inputs) => {
        input.addEventListener('input', () => {
            if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
        });
    });
    // Logo → home, beforeunload, translations
    mlWireLogoToHome();
    mlWireBeforeUnload();
    mlApply('verify');
</script>

<!-- Decorative grid background -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-[0.03]">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
<path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="1"></path>
</pattern>
</defs>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
</svg>
</div>
</main>
</body></html>
